    <script>
        async function getReleases() {
            try {
                const response = await fetch("https://chookspace.com/api/repos/comet/comet/releases");

                if (!response.ok) {
                    throw new Error("Could not get releases");
                }

                const data = await response.json();
                console.log(data)
                return data
            } catch (error) {
                console.error("Error fetching releases:", error)
            }
        }

        const releases = getReleases();
    </script>
