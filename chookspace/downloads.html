<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comet - Downloads</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/downloads-style.css">
</head>

<body>
    <script>
        const releasesTable = document.getElementById("table-body");

        async function getReleases() {
            try {
                const response = await fetch("https://chsp.au/api/v1/repos/comet/comet/releases");

                if (!response.ok) {
                    throw new Error("Could not get releases");
                }

                const data = await response.json();
                console.log(data)
                return data
            } catch (error) {
                console.error("Error fetching releases:", error)
                return [];
            }
        }

        function createRelease(data) {
            const newRelease = document.createElement("div");
            newRelease.className = "row";

            const version = document.createElement("p");
            version.innerText = data.tag_name;
            newRelease.append(version);

            const createdAtDate = new Date(data.published_at);
            const day = createdAtDate.getDate();

            function ordinal(n) {
                if (n > 3 && n < 21) return `${n}th`;

                switch (n % 10) {
                    case 1: return `${n}st`;
                    case 2: return `${n}nd`;
                    case 3: return `${n}rd`;
                    case 4: return `${n}th`;
                }
            }

            console.log(createdAtDate);

            const createdAt = document.createElement("p");
            createdAt.innerText = `${createdAtDate.toLocalString("en-US", {
                month: "long"
            })} ${ordinal(day)}, ${createdAtDate.getFullYear()}`
            newRelease.append(createdAt);

            const link = document.createElement("a");
            link.href = data.html_url;
            link.innerText = "Download";
            newRelease.append(link)

            releasesTable.append(newRelease)
        }

        async function main() {
            const releases = await getReleases();
            releases.forEach(element => {
                createRelease(element)
            });
        }

        main();
    </script>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="docs.html">Docs</a></li>
            <li><a href="downloads.html">Download</a></li>
        </ul>
    </nav>

    <main id="main">
        <div id="outer">
             <div id="inner">
                <h1>Download Comet</h1>
                <p>Start your journey.</p>
                <div class="horizontal">
                    <a href="#" class="btn btn-primary">Download Latest</a>
                    <a href="#versions" class="btn">Other Versions</a>
                </div>
            </div>
        </div>

        <div id="versions">
            <h1>Versions</h1>

            <div id="table">
                <div id="table-header">
                    <p>Version</p>
                    <p>Released</p>
                    <p>Download</p>
                </div>
                <div id="table-body">
                    <!--<div class="row">

    </main>

</body>
